<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Aetheris Vision">
  <!-- Square favicon mark: globe + eye swooshes (no wordmark). Colors from brand/colors/tokens.json -->
  <defs>
    <linearGradient id="swoopUpper" x1="80" y1="200" x2="400" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#29426C"/>
      <stop offset="100%" stop-color="#486890"/>
    </linearGradient>
    <linearGradient id="swoopLower" x1="60" y1="320" x2="420" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5BA8D9"/>
      <stop offset="100%" stop-color="#6EC4D6"/>
    </linearGradient>
    <radialGradient id="globeShade" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0%" stop-color="#7EABCA"/>
      <stop offset="55%" stop-color="#486890"/>
      <stop offset="100%" stop-color="#29426C"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="256" cy="262" r="78"/>
    </clipPath>
  </defs>

  <!-- Lower eyelid -->
  <path
    d="M72 292 C120 360, 200 388, 256 388 C312 388, 392 360, 440 292"
    stroke="url(#swoopLower)" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Upper eyelid -->
  <path
    d="M88 228 C150 150, 210 128, 256 128 C302 128, 362 150, 424 228"
    stroke="url(#swoopUpper)" stroke-width="30" stroke-linecap="round" fill="none"/>

  <!-- Globe -->
  <circle cx="256" cy="262" r="78" fill="url(#globeShade)"/>
  <g clip-path="url(#globeClip)" stroke="rgba(255,255,255,0.45)" stroke-width="2.2" fill="none">
    <ellipse cx="256" cy="262" rx="78" ry="26"/>
    <ellipse cx="256" cy="262" rx="78" ry="52"/>
    <ellipse cx="256" cy="262" rx="52" ry="78"/>
    <line x1="178" y1="262" x2="334" y2="262"/>
    <path d="M256 184 A78 78 0 0 1 256 340"/>
    <path d="M256 184 A78 78 0 0 0 256 340"/>
    <path d="M210 262 A46 78 0 0 1 302 262"/>
    <path d="M210 262 A46 78 0 0 0 302 262"/>
  </g>
  <circle cx="230" cy="236" r="18" fill="rgba(255,255,255,0.35)"/>

  <!-- Inner motion accent -->
  <path
    d="M118 268 C170 248, 210 242, 256 248"
    stroke="#5BA8D9" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.85"/>
</svg>
