name: CI

on:
  push:
    branches-ignore:
      - main        # feature/fix branches only — Vercel owns the main pipeline
  pull_request:
    branches:
      - main        # every PR targeting main runs all checks

env:
  GITLAB_REPO: https://gitlab.com/aetheris-vision-group/aetheris-vision-project.git

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (0 errors, max 27 warnings)
        run: npm run lint -- --max-warnings=27
        # Ratchet: lower this number as warnings are cleaned up.
        # Current baseline after PR #21: 27 warnings (all non-blocking categories).
        # Any new error → CI fails immediately.

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]   # only build if all checks pass
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ID }}
          PREVIEW_PASSWORD: ${{ secrets.PREVIEW_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://aetherisvision.com

      - name: Mirror to GitLab
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@${GITLAB_REPO#https://}
          git push gitlab main --force
