name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITLAB_REPO: https://gitlab.com/aetheris-vision-group/aetheris-vision-project.git

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FORMSPREE_ID: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ID }}
          PREVIEW_PASSWORD: ${{ secrets.PREVIEW_PASSWORD }}

      - name: Mirror to GitLab
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@${GITLAB_REPO#https://}
          git push gitlab main --force
