name: Vercel Deployment Monitor
description: Automatically monitor Vercel deployments using MCP tools

on:
  push:
    branches: [main, production]
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}

jobs:
  monitor-deployment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install MCP dependencies
        run: |
          cd mcp
          pip install -e .

      - name: Wait for Vercel deployment to start
        run: sleep 30

      - name: Check deployment status
        id: check_status
        run: |
          cd mcp
          python -c "
          import asyncio
          import os
          from vercel_server import VercelClient, check_current_deployment_status
          
          async def main():
              try:
                  client = VercelClient(
                      token=os.getenv('VERCEL_TOKEN'),
                      team_id=os.getenv('VERCEL_TEAM_ID')
                  )
                  
                  # Check current deployment status
                  result = await check_current_deployment_status('website')
                  print('DEPLOYMENT_STATUS<<EOF')
                  print(result)
                  print('EOF')
                  
              except Exception as e:
                  print(f'Error: {e}')
                  exit(1)
          
          asyncio.run(main())
          " >> $GITHUB_OUTPUT

      - name: Monitor deployment progress
        run: |
          cd mcp
          python -c "
          import asyncio
          import os
          from vercel_server import VercelClient, monitor_latest_deployment
          
          async def main():
              try:
                  client = VercelClient(
                      token=os.getenv('VERCEL_TOKEN'), 
                      team_id=os.getenv('VERCEL_TEAM_ID')
                  )
                  
                  # Monitor deployment for up to 10 minutes
                  result = await monitor_latest_deployment('website', 10)
                  print(result)
                  
              except Exception as e:
                  print(f'Error monitoring deployment: {e}')
                  exit(1)
          
          asyncio.run(main())
          "

      - name: Report deployment result
        run: |
          echo "✅ Deployment monitoring completed!"
          echo "Check the logs above for detailed deployment status."
          
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment monitoring failed!"
          echo "Please check the Vercel dashboard manually."